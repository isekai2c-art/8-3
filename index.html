<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc mừng 8/3</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#ffd6e7,#ffb6d9);
text-align:center;
overflow:hidden;
}

h1{
margin-top:40px;
color:#d63384;
font-size:40px;
}

.box{
margin-top:40px;
background:rgba(255,255,255,0.3);
display:inline-block;
padding:25px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input{
padding:12px;
font-size:18px;
border:none;
border-radius:12px;
text-align:center;
width:140px;
outline:none;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:20px;
font-size:16px;
cursor:pointer;
background:#ff69b4;
color:white;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:#ff1493;
}

.card{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:35px;
border-radius:20px;
width:320px;
box-shadow:0 0 30px rgba(0,0,0,0.3);
}

.name{
font-size:22px;
font-weight:bold;
color:#ff1493;
}

.wish{
margin-top:10px;
font-size:18px;
}

/* máy bay */

.plane{
position:fixed;
font-size:50px;
left:-100px;
top:60%;
transition:2s cubic-bezier(.4,.8,.2,1);
}

/* vòng quay */

#wheelBox{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

#wheel{
width:320px;
height:320px;
border-radius:50%;
border:10px solid white;
box-shadow:0 0 30px rgba(0,0,0,0.3);
transition:transform 4s cubic-bezier(.2,.8,.3,1);
}

.pointer{
font-size:45px;
}

/* hoa */

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<h1>🌸 Chúc mừng 8/3 🌸</h1>

<div class="box">

<p>Nhập số thứ tự của bạn</p>

<input id="stt" type="number">

<br>

<button onclick="sendPlane()">✈ Nhận lời chúc</button>

<button onclick="openWheel()">🎁 Vòng quay</button>

</div>

<div class="plane" id="plane">✈</div>

<div class="card" id="card">

<div class="name" id="name"></div>

<div class="wish">
Chúc bạn luôn xinh đẹp, học giỏi và có một ngày 8/3 thật vui vẻ 💖
</div>

<br>

<button onclick="closeCard()">Đóng</button>

</div>

<div id="wheelBox">

<div class="pointer">🔻</div>

<canvas id="wheel" width="320" height="320"></canvas>

<br>

<button onclick="spin()">Quay</button>
<button onclick="closeWheel()">Đóng</button>

</div>

<audio id="spinSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9bda63.mp3">
</audio>

<canvas id="petals"></canvas>

<script>

const girls={
1:"Dương Thị Thảo Ái",
3:"Nguyễn Thị Bình Dương",
4:"Nguyễn Thị Linh Đan",
7:"Nguyễn Thị Thúy Kiều",
8:"Dương Thùy Linh",
9:"Khổng Thị Linh",
10:"Lê Thị Linh",
11:"Hồ Thị Khánh Ly",
12:"Võ Thị Ly",
13:"Nguyễn Thị Thanh Mai",
14:"Lê Thị Thương Mây",
15:"Trần Thị Thanh Nga",
16:"Nguyễn Lê Thùy Ngân",
17:"Nguyễn Thị Thanh Ngân",
20:"Trần Thị Thanh Ngọc",
22:"Nguyễn Ngọc Phương Nhã",
25:"Nguyễn Ngọc Quỳnh Như",
28:"Nguyễn Thị Minh Phương",
30:"Hoàng Thị Diệu Thanh",
31:"Đào Thị Thanh Thảo",
32:"Nguyễn Thị Thanh Thảo",
33:"Lê Thị Thắm",
34:"Phan Thị Thơm",
36:"Phan Thị Anh Thư",
37:"Võ Thị Ngọc Trâm",
38:"Võ Thị Thùy Trâm",
39:"Mai Thị Vân",
40:"Lê Thị Hà Vi"
}

function sendPlane(){

let stt=document.getElementById("stt").value

if(!girls[stt]){
alert("Không có trong danh sách nữ")
return
}

let plane=document.getElementById("plane")

plane.style.left="50%"

setTimeout(()=>{

plane.style.left="120%"

document.getElementById("name").innerText="💗 "+girls[stt]

document.getElementById("card").style.display="block"

},1800)

}

function closeCard(){
document.getElementById("card").style.display="none"
}

/* vòng quay */

const prizes=[
"🍬 Kẹo",
"🍫 Chocolate",
"🌸 Hoa",
"🎁 Quà bí mật",
"🍪 Bánh",
"💖 Lời khen"
]

const colors=["#ff9aa2","#ffb7b2","#ffdac1","#e2f0cb","#b5ead7","#c7ceea"]

const wheel=document.getElementById("wheel")
const ctx=wheel.getContext("2d")

function drawWheel(){

let angle=2*Math.PI/prizes.length

for(let i=0;i<prizes.length;i++){

ctx.beginPath()

ctx.moveTo(160,160)

ctx.arc(160,160,160,i*angle,(i+1)*angle)

ctx.fillStyle=colors[i]

ctx.fill()

ctx.save()

ctx.translate(160,160)

ctx.rotate(angle*(i+0.5))

ctx.fillStyle="#333"

ctx.fillText(prizes[i],80,5)

ctx.restore()

}

}

drawWheel()

let rotation=0

function spin(){

document.getElementById("spinSound").play()

let rand=Math.floor(Math.random()*prizes.length)

let angle=360/prizes.length

rotation+=360*5+(360-rand*angle)

wheel.style.transform="rotate("+rotation+"deg)"

setTimeout(()=>{
alert("Bạn nhận được: "+prizes[rand])
},4000)

}

function openWheel(){
document.getElementById("wheelBox").style.display="block"
}

function closeWheel(){
document.getElementById("wheelBox").style.display="none"
}

/* hoa đào */

const canvas=document.getElementById("petals")
const ctx2=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let petals=[]

for(let i=0;i<70;i++){
petals.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*8+4,
speed:Math.random()*2+1
})
}

function drawPetals(){

ctx2.clearRect(0,0,canvas.width,canvas.height)

for(let p of petals){

ctx2.fillStyle="#ff69b4"

ctx2.beginPath()

ctx2.ellipse(p.x,p.y,p.size/2,p.size,0,0,Math.PI*2)

ctx2.fill()

p.y+=p.speed

p.x+=Math.sin(p.y*0.01)

if(p.y>canvas.height){
p.y=0
p.x=Math.random()*canvas.width
}

}

requestAnimationFrame(drawPetals)

}

drawPetals()

</script>

</body>
</html>
