<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<title>Chúc mừng 8/3</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:url("https://cdn-media.sforum.vn/storage/app/media/ctvseo_MH/hihf%20n%E1%BB%81n%208.3/hinh-nen-8-3-14.jpg") center/cover fixed;
text-align:center;
overflow:hidden;
}

h1{
font-family:Dancing Script;
font-size:50px;
color:#ff1493;
margin-top:30px;
}

.box{

background:rgba(255,255,255,0.6);

display:inline-block;
padding:25px;

border-radius:20px;

margin-top:40px;

}

input{

padding:10px;
font-size:18px;
border-radius:10px;
border:none;

}

button{

padding:10px 20px;

border:none;

background:#ff1493;

color:white;

border-radius:20px;

margin:10px;

cursor:pointer;

}

button:hover{
transform:scale(1.1);
}

/* ================= */
/* THIỆP */
/* ================= */

#letterBox{

display:none;

position:fixed;

top:50%;
left:50%;

transform:translate(-50%,-50%);

}

.envelope{

position:relative;

width:420px;
height:260px;

}

/* thân phong bì */

.body{

position:absolute;

width:100%;
height:180px;

bottom:0;

background:#ff69b4;

border-radius:8px;

}

/* nắp */

.flap{

position:absolute;

width:0;
height:0;

border-left:210px solid transparent;
border-right:210px solid transparent;

border-bottom:130px solid #ff4fa0;

top:0;

transform-origin:top;

transition:1s;

}

/* giấy */

.letter{

position:absolute;

width:360px;
height:180px;

background:white;

left:30px;

bottom:20px;

border-radius:10px;

padding:20px;

box-shadow:0 10px 20px rgba(0,0,0,0.3);

transition:1s;

}

/* mở */

.envelope.open .flap{
transform:rotateX(180deg);
}

.envelope.open .letter{
transform:translateY(-120px);
}

/* ================= */
/* VÒNG QUAY */
/* ================= */

#wheelBox{

display:none;

position:fixed;

top:50%;
left:50%;

transform:translate(-50%,-50%);

}

.wheelContainer{

position:relative;

width:420px;
height:420px;

}

#wheel{

border-radius:50%;

border:10px solid white;

box-shadow:0 0 30px rgba(0,0,0,0.4);

transition:transform 5s cubic-bezier(.17,.67,.28,1.33);

}

.pointer{

position:absolute;

top:-15px;
left:50%;

transform:translateX(-50%);

width:0;
height:0;

border-left:15px solid transparent;
border-right:15px solid transparent;

border-bottom:30px solid red;

}

/* hoa */

canvas{

position:fixed;
top:0;
left:0;

pointer-events:none;

}

</style>
</head>

<body>

<h1>🌸 Chúc mừng 8/3 🌸</h1>

<div class="box">

<p>Nhập STT của bạn</p>

<input id="stt">

<br>

<button onclick="openLetter()">Nhận thiệp</button>

<button onclick="openWheel()">Vòng quay</button>

</div>

<!-- THIỆP -->

<div id="letterBox">

<div class="envelope" id="envelope">

<div class="body"></div>

<div class="flap"></div>

<div class="letter">

<h2 id="name"></h2>

<p>Chúc bạn có một ngày 8/3 thật vui vẻ ❤️</p>

<button onclick="closeLetter()">← Trở về</button>

</div>

</div>

</div>

<!-- VÒNG QUAY -->

<div id="wheelBox">

<div class="wheelContainer">

<div class="pointer"></div>

<canvas id="wheel" width="420" height="420"></canvas>

<button onclick="spin()" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)">
QUAY
</button>

</div>

<button onclick="closeWheel()">← Trở về</button>

</div>

<canvas id="petals"></canvas>

<script>

/* danh sách */

const girls={
12:"Võ Thị Ly",
30:"Hoàng Thị Diệu Thanh",
40:"Lê Thị Hà Vi"
}

/* mở thiệp */

function openLetter(){

let stt=document.getElementById("stt").value

if(!girls[stt]){
alert("Không có trong danh sách nữ")
return
}

document.getElementById("name").innerText=girls[stt]

document.getElementById("letterBox").style.display="block"

setTimeout(()=>{
document.getElementById("envelope").classList.add("open")
},200)

}

function closeLetter(){

document.getElementById("letterBox").style.display="none"

document.getElementById("envelope").classList.remove("open")

}

/* ================= */
/* VÒNG QUAY */
/* ================= */

const prizes=["Kẹo","Chocolate","Hoa","Quà","Bánh","Lời khen"]

const colors=["#ff9aa2","#ffb7b2","#ffdac1","#e2f0cb","#b5ead7","#c7ceea"]

const wheel=document.getElementById("wheel")

const ctx=wheel.getContext("2d")

const center=210

function drawWheel(){

const angle=(2*Math.PI)/prizes.length

for(let i=0;i<prizes.length;i++){

ctx.beginPath()

ctx.moveTo(center,center)

ctx.arc(center,center,200,i*angle,(i+1)*angle)

ctx.fillStyle=colors[i]

ctx.fill()

ctx.save()

ctx.translate(center,center)

ctx.rotate(i*angle+angle/2)

ctx.textAlign="center"

ctx.fillStyle="#333"

ctx.font="18px Poppins"

ctx.fillText(prizes[i],120,10)

ctx.restore()

}

}

drawWheel()

let rotation=0

function spin(){

let rand=Math.floor(Math.random()*prizes.length)

let angle=360/prizes.length

rotation+=360*5+(360-rand*angle)

wheel.style.transform="rotate("+rotation+"deg)"

setTimeout(()=>{

alert("Bạn nhận được: "+prizes[rand])

},5000)

}

function openWheel(){
document.getElementById("wheelBox").style.display="block"
}

function closeWheel(){
document.getElementById("wheelBox").style.display="none"
}

/* ================= */
/* HOA RƠI */
/* ================= */

const canvas=document.getElementById("petals")

const ctx2=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let petals=[]

for(let i=0;i<40;i++){

petals.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

size:Math.random()*5+3,

speed:Math.random()*1+0.5

})

}

function draw(){

ctx2.clearRect(0,0,canvas.width,canvas.height)

ctx2.fillStyle="pink"

for(let p of petals){

ctx2.beginPath()

ctx2.arc(p.x,p.y,p.size,0,Math.PI*2)

ctx2.fill()

p.y+=p.speed

if(p.y>canvas.height){

p.y=0

p.x=Math.random()*canvas.width

}

}

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
