<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc mừng 8/3</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:url("background.jpg") no-repeat center center fixed;
background-size:cover;
text-align:center;
overflow:hidden;
}

/* lớp phủ */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.45);
backdrop-filter:blur(4px);
z-index:-1;
}

/* tiêu đề */

h1{
margin-top:40px;
color:#d63384;
font-size:42px;
}

/* box */

.box{
margin-top:40px;
background:rgba(255,255,255,0.5);
padding:25px;
border-radius:20px;
display:inline-block;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
padding:12px;
font-size:18px;
border:none;
border-radius:12px;
width:150px;
text-align:center;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:20px;
font-size:16px;
cursor:pointer;
background:#ff69b4;
color:white;
transition:0.3s;
}

button:hover{
background:#ff1493;
transform:scale(1.1);
}

/* máy bay */

.plane{
position:fixed;
font-size:60px;
top:25%;
left:-200px;
transition:3s linear;
}

/* phong bì */

.envelope{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:320px;
height:220px;
background:white;
border-radius:10px;
box-shadow:0 0 30px rgba(0,0,0,0.3);
overflow:hidden;
}

.flap{
position:absolute;
width:100%;
height:100%;
background:#ff69b4;
clip-path:polygon(0 0,100% 0,50% 60%);
transform-origin:top;
transition:1s;
}

.letter{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.name{
font-size:22px;
font-weight:bold;
color:#ff1493;
}

/* vòng quay */

#wheelBox{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

#wheel{
width:320px;
height:320px;
border-radius:50%;
border:10px solid white;
transition:transform 4s ease-out;
}

.pointer{
font-size:45px;
}

/* canvas */

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<div class="overlay"></div>

<h1>🌸 Chúc mừng ngày 8/3 🌸</h1>

<div class="box">

<p>Nhập STT của bạn</p>

<input id="stt" type="number">

<br>

<button onclick="startPlane()">💌 Nhận lời chúc</button>
<button onclick="openWheel()">🎁 Vòng quay</button>

</div>

<div class="plane" id="plane">✈</div>

<div class="envelope" id="env">

<div class="flap" id="flap"></div>

<div class="letter">

<div class="name" id="name"></div>

<p>Chúc bạn luôn xinh đẹp, học giỏi và có một ngày 8/3 thật vui vẻ 💖</p>

<br>

<button onclick="closeLetter()">Đóng</button>

</div>

</div>

<div id="wheelBox">

<div class="pointer">🔻</div>

<canvas id="wheel" width="320" height="320"></canvas>

<br>

<button onclick="spin()">Quay</button>
<button onclick="closeWheel()">Đóng</button>

</div>

<audio id="spinSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9bda63.mp3">
</audio>

<canvas id="petals"></canvas>

<script>

/* danh sách */

const girls={
1:"Dương Thị Thảo Ái",
3:"Nguyễn Thị Bình Dương",
4:"Nguyễn Thị Linh Đan",
7:"Nguyễn Thị Thúy Kiều",
8:"Dương Thùy Linh",
9:"Khổng Thị Linh",
10:"Lê Thị Linh",
11:"Hồ Thị Khánh Ly",
12:"Võ Thị Ly",
13:"Nguyễn Thị Thanh Mai",
14:"Lê Thị Thương Mây",
15:"Trần Thị Thanh Nga",
16:"Nguyễn Lê Thùy Ngân",
17:"Nguyễn Thị Thanh Ngân",
20:"Trần Thị Thanh Ngọc",
22:"Nguyễn Ngọc Phương Nhã",
25:"Nguyễn Ngọc Quỳnh Như",
28:"Nguyễn Thị Minh Phương",
30:"Hoàng Thị Diệu Thanh",
31:"Đào Thị Thanh Thảo",
32:"Nguyễn Thị Thanh Thảo",
33:"Lê Thị Thắm",
34:"Phan Thị Thơm",
36:"Phan Thị Anh Thư",
37:"Võ Thị Ngọc Trâm",
38:"Võ Thị Thùy Trâm",
39:"Mai Thị Vân",
40:"Lê Thị Hà Vi"
}

/* máy bay */

function startPlane(){

let stt=document.getElementById("stt").value

if(!girls[stt]){
alert("Không có trong danh sách nữ")
return
}

let plane=document.getElementById("plane")

plane.style.left="110%"

setTimeout(()=>{

document.getElementById("env").style.display="block"

document.getElementById("name").innerText=girls[stt]

setTimeout(()=>{
document.getElementById("flap").style.transform="rotateX(180deg)"
},500)

},2800)

}

function closeLetter(){
document.getElementById("env").style.display="none"
}

/* vòng quay */

const prizes=[
"🍬 Kẹo",
"🍫 Chocolate",
"🌸 Hoa",
"🎁 Quà bí mật",
"🍪 Bánh",
"💖 Lời khen"
]

const colors=["#ff9aa2","#ffb7b2","#ffdac1","#e2f0cb","#b5ead7","#c7ceea"]

const wheel=document.getElementById("wheel")
const ctx=wheel.getContext("2d")

function drawWheel(){

let angle=2*Math.PI/prizes.length

for(let i=0;i<prizes.length;i++){

ctx.beginPath()
ctx.moveTo(160,160)
ctx.arc(160,160,160,i*angle,(i+1)*angle)

ctx.fillStyle=colors[i]
ctx.fill()

ctx.save()
ctx.translate(160,160)
ctx.rotate(angle*(i+0.5))
ctx.fillStyle="#333"
ctx.fillText(prizes[i],80,5)
ctx.restore()

}

}

drawWheel()

let rotation=0

function spin(){

document.getElementById("spinSound").play()

let rand=Math.floor(Math.random()*prizes.length)

let angle=360/prizes.length

rotation+=360*5+(360-rand*angle)

wheel.style.transform="rotate("+rotation+"deg)"

setTimeout(()=>{
alert("Bạn nhận được: "+prizes[rand])
fireworks()
},4000)

}

function openWheel(){
document.getElementById("wheelBox").style.display="block"
}

function closeWheel(){
document.getElementById("wheelBox").style.display="none"
}

/* hoa */

const canvas=document.getElementById("petals")
const ctx2=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let petals=[]

for(let i=0;i<70;i++){
petals.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*8+4,
speed:Math.random()*2+1
})
}

function drawPetals(){

ctx2.clearRect(0,0,canvas.width,canvas.height)

for(let p of petals){

ctx2.fillStyle="#ff69b4"

ctx2.beginPath()
ctx2.ellipse(p.x,p.y,p.size/2,p.size,0,0,Math.PI*2)
ctx2.fill()

p.y+=p.speed
p.x+=Math.sin(p.y*0.02)

if(p.y>canvas.height){
p.y=0
p.x=Math.random()*canvas.width
}

}

requestAnimationFrame(drawPetals)

}

drawPetals()

/* pháo hoa */

function fireworks(){

for(let i=0;i<30;i++){

let div=document.createElement("div")

div.style.position="fixed"
div.style.left="50%"
div.style.top="50%"
div.style.width="6px"
div.style.height="6px"
div.style.background="gold"
div.style.borderRadius="50%"
div.style.transition="1s"

document.body.appendChild(div)

let x=(Math.random()-0.5)*600
let y=(Math.random()-0.5)*600

setTimeout(()=>{
div.style.transform="translate("+x+"px,"+y+"px)"
div.style.opacity=0
},10)

setTimeout(()=>{
div.remove()
},1000)

}

}

</script>

</body>
</html>
