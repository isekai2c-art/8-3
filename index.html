<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc mừng 8/3</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffd6e7,#ffb6d9);
text-align:center;
overflow:hidden;
}

h1{
color:#d63384;
margin-top:30px;
}

.container{
margin-top:40px;
}

input{
padding:10px;
font-size:18px;
border-radius:10px;
border:none;
width:120px;
text-align:center;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:20px;
font-size:16px;
cursor:pointer;
background:#ff69b4;
color:white;
transition:0.3s;
}

button:hover{
background:#ff1493;
transform:scale(1.1);
}

.card{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
width:300px;
animation:pop 0.5s;
}

@keyframes pop{
0%{transform:translate(-50%,-60%) scale(0.5)}
100%{transform:translate(-50%,-50%) scale(1)}
}

.name{
font-size:20px;
font-weight:bold;
color:#ff1493;
}

.wish{
margin-top:10px;
font-size:18px;
}

.petals{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<h1>🌸 Chúc mừng ngày 8/3 🌸</h1>
<p>Nhập số thứ tự của bạn</p>

<div class="container">

<input id="stt" type="number">

<br>

<button onclick="showWish()">💌 Lời chúc</button>
<button onclick="spin()">🎁 Quay thưởng</button>

</div>

<div class="card" id="card">
<div class="name" id="name"></div>
<div class="wish">
Chúc bạn luôn xinh đẹp, học giỏi và có một ngày 8/3 thật vui vẻ 💖
</div>
<br>
<button onclick="closeCard()">Đóng</button>
</div>

<audio autoplay loop>
<source src="https://files.catbox.moe/7q6b5b.mp3" type="audio/mpeg">
</audio>

<canvas class="petals" id="petals"></canvas>

<script>

const girls={
1:"Dương Thị Thảo Ái",
3:"Nguyễn Thị Bình Dương",
4:"Nguyễn Thị Linh Đan",
7:"Nguyễn Thị Thúy Kiều",
8:"Dương Thùy Linh",
9:"Khổng Thị Linh",
10:"Lê Thị Linh",
11:"Hồ Thị Khánh Ly",
12:"Võ Thị Ly",
13:"Nguyễn Thị Thanh Mai",
14:"Lê Thị Thương Mây",
15:"Trần Thị Thanh Nga",
16:"Nguyễn Lê Thùy Ngân",
17:"Nguyễn Thị Thanh Ngân",
20:"Trần Thị Thanh Ngọc",
22:"Nguyễn Ngọc Phương Nhã",
25:"Nguyễn Ngọc Quỳnh Như",
28:"Nguyễn Thị Minh Phương",
30:"Hoàng Thị Diệu Thanh",
31:"Đào Thị Thanh Thảo",
32:"Nguyễn Thị Thanh Thảo",
33:"Lê Thị Thắm",
34:"Phan Thị Thơm",
36:"Phan Thị Anh Thư",
37:"Võ Thị Ngọc Trâm",
38:"Võ Thị Thùy Trâm",
39:"Mai Thị Vân",
40:"Lê Thị Hà Vi"
}

function showWish(){

let stt=document.getElementById("stt").value

if(girls[stt]){
document.getElementById("name").innerText="💗 "+girls[stt]
document.getElementById("card").style.display="block"
}
else{
alert("Không có trong danh sách nữ")
}

}

function closeCard(){
document.getElementById("card").style.display="none"
}

function spin(){

const prizes=[
"🍬 Kẹo",
"🍫 Chocolate",
"🎁 Quà bí mật",
"🌸 Hoa",
"🍪 Bánh",
"💖 Một lời khen"
]

let prize=prizes[Math.floor(Math.random()*prizes.length)]

alert("Bạn nhận được: "+prize)

}

const canvas=document.getElementById("petals")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let petals=[]

for(let i=0;i<40;i++){
petals.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*4+1,
d:Math.random()*1
})
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#ff69b4"

ctx.beginPath()

for(let i=0;i<petals.length;i++){

let p=petals[i]

ctx.moveTo(p.x,p.y)
ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true)

}

ctx.fill()

update()

}

function update(){

for(let i=0;i<petals.length;i++){

let p=petals[i]

p.y+=p.d+1

if(p.y>canvas.height){
petals[i]={x:Math.random()*canvas.width,y:0,r:p.r,d:p.d}
}

}

}

setInterval(draw,33)

</script>

</body>
</html>
