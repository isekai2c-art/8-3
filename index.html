<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc mừng 8/3</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:url("https://cdn-media.sforum.vn/storage/app/media/ctvseo_MH/hihf%20n%E1%BB%81n%208.3/hinh-nen-8-3-14.jpg") no-repeat center center fixed;
background-size:cover;
text-align:center;
overflow:hidden;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.4);
backdrop-filter:blur(5px);
z-index:-1;
}

h1{
margin-top:40px;
font-family:Dancing Script;
font-size:50px;
color:#ff1493;
}

/* box nhập */

.box{
margin-top:40px;
background:rgba(255,255,255,0.55);
padding:25px;
border-radius:20px;
display:inline-block;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
padding:12px;
font-size:18px;
border:none;
border-radius:12px;
width:150px;
text-align:center;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:20px;
font-size:16px;
cursor:pointer;
background:#ff69b4;
color:white;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:#ff1493;
}

/* ===== THIỆP ===== */

#letterBox{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
perspective:1000px;
}

.letter{

width:420px;
height:260px;
position:relative;
transform-style:preserve-3d;
transition:1s;
}

.flap{
position:absolute;
width:100%;
height:50%;
background:#ff69b4;
top:0;
transform-origin:top;
border-radius:10px 10px 0 0;
transition:1s;
}

.open .flap{
transform:rotateX(-160deg);
}

.paper{

position:absolute;
top:20px;
left:10px;
width:400px;
height:230px;
background:white;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
padding:25px;
}

.name{
font-size:28px;
color:#ff1493;
font-weight:bold;
}

.backBtn{
margin-top:20px;
}

/* ===== VÒNG QUAY ===== */

#wheelBox{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.wheelContainer{
position:relative;
width:420px;
height:420px;
}

#wheel{
width:400px;
height:400px;
border-radius:50%;
border:8px solid white;
box-shadow:0 0 30px rgba(0,0,0,0.3);
transition:transform 5s cubic-bezier(.17,.67,.28,1.33);
}

.pointer{
position:absolute;
top:-10px;
left:50%;
transform:translateX(-50%);
font-size:50px;
color:red;
}

.spinBtn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:15px 30px;
font-size:18px;
background:#ff1493;
border:none;
color:white;
border-radius:50px;
cursor:pointer;
}

/* hoa */

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<div class="overlay"></div>

<h1>🌸 Chúc mừng 8/3 🌸</h1>

<div class="box">

<p>Nhập STT của bạn</p>

<input id="stt" type="number">

<br>

<button onclick="openLetter()">💌 Nhận thiệp</button>
<button onclick="openWheel()">🎁 Vòng quay</button>

</div>

<!-- THIỆP -->

<div id="letterBox">

<div class="letter" id="letter">

<div class="flap"></div>

<div class="paper">

<div class="name" id="name"></div>

<p>
Chúc bạn luôn xinh đẹp, học giỏi và có một ngày
<strong>8/3 thật vui vẻ 💖</strong>
</p>

<button class="backBtn" onclick="closeLetter()">⬅ Trở về</button>

</div>

</div>

</div>

<!-- VÒNG QUAY -->

<div id="wheelBox">

<div class="wheelContainer">

<div class="pointer">▼</div>

<canvas id="wheel" width="400" height="400"></canvas>

<button class="spinBtn" onclick="spin()">QUAY</button>

<button onclick="closeWheel()" style="position:absolute;bottom:-60px;left:50%;transform:translateX(-50%)">
⬅ Trở về
</button>

</div>

</div>

<canvas id="petals"></canvas>

<script>

/* danh sách */

const girls={
1:"Dương Thị Thảo Ái",
3:"Nguyễn Thị Bình Dương",
4:"Nguyễn Thị Linh Đan",
7:"Nguyễn Thị Thúy Kiều",
8:"Dương Thùy Linh",
9:"Khổng Thị Linh",
10:"Lê Thị Linh",
11:"Hồ Thị Khánh Ly",
12:"Võ Thị Ly",
13:"Nguyễn Thị Thanh Mai",
14:"Lê Thị Thương Mây",
15:"Trần Thị Thanh Nga",
16:"Nguyễn Lê Thùy Ngân",
17:"Nguyễn Thị Thanh Ngân",
20:"Trần Thị Thanh Ngọc",
22:"Nguyễn Ngọc Phương Nhã",
25:"Nguyễn Ngọc Quỳnh Như",
28:"Nguyễn Thị Minh Phương",
30:"Hoàng Thị Diệu Thanh",
31:"Đào Thị Thanh Thảo",
32:"Nguyễn Thị Thanh Thảo",
33:"Lê Thị Thắm",
34:"Phan Thị Thơm",
36:"Phan Thị Anh Thư",
37:"Võ Thị Ngọc Trâm",
38:"Võ Thị Thùy Trâm",
39:"Mai Thị Vân",
40:"Lê Thị Hà Vi"
}

/* mở thiệp */

function openLetter(){

let stt=document.getElementById("stt").value

if(!girls[stt]){
alert("Không có trong danh sách nữ")
return
}

document.getElementById("name").innerText=girls[stt]

document.getElementById("letterBox").style.display="block"

setTimeout(()=>{
document.getElementById("letter").classList.add("open")
},300)

}

function closeLetter(){

document.getElementById("letterBox").style.display="none"

document.getElementById("letter").classList.remove("open")

}

/* ===== vòng quay ===== */

const prizes=["🍬 Kẹo","🍫 Chocolate","🌸 Hoa","🎁 Quà","🍪 Bánh","💖 Lời khen"]
const colors=["#ff9aa2","#ffb7b2","#ffdac1","#e2f0cb","#b5ead7","#c7ceea"]

const wheel=document.getElementById("wheel")
const ctx=wheel.getContext("2d")

const size=400
const center=size/2
const radius=200

function drawWheel(){

const angle=(2*Math.PI)/prizes.length

for(let i=0;i<prizes.length;i++){

ctx.beginPath()
ctx.moveTo(center,center)
ctx.arc(center,center,radius,i*angle,(i+1)*angle)

ctx.fillStyle=colors[i]
ctx.fill()

ctx.save()

ctx.translate(center,center)
ctx.rotate(i*angle+angle/2)

ctx.fillStyle="#333"
ctx.font="16px Poppins"
ctx.textAlign="right"

ctx.fillText(prizes[i],170,10)

ctx.restore()

}

}

drawWheel()

let rotation=0

function spin(){

let rand=Math.floor(Math.random()*prizes.length)
let angle=360/prizes.length

rotation+=360*5+(360-rand*angle)

wheel.style.transform="rotate("+rotation+"deg)"

setTimeout(()=>{
alert("Bạn nhận được: "+prizes[rand])
},5000)

}

function openWheel(){
document.getElementById("wheelBox").style.display="block"
}

function closeWheel(){
document.getElementById("wheelBox").style.display="none"
}

/* hoa */

const canvas=document.getElementById("petals")
const ctx2=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let petals=[]

for(let i=0;i<40;i++){

petals.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*8+4,
speed:Math.random()*1+0.5
})

}

function draw(){

ctx2.clearRect(0,0,canvas.width,canvas.height)

ctx2.fillStyle="pink"

for(let p of petals){

ctx2.beginPath()
ctx2.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx2.fill()

p.y+=p.speed

if(p.y>canvas.height){
p.y=0
p.x=Math.random()*canvas.width
}

}

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
