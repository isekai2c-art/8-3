```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc mừng 8/3</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:url("https://cdn-media.sforum.vn/storage/app/media/ctvseo_MH/hihf%20n%E1%BB%81n%208.3/hinh-nen-8-3-14.jpg") no-repeat center center fixed;
background-size:cover;
text-align:center;
overflow:hidden;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.45);
backdrop-filter:blur(4px);
z-index:-1;
}

h1{
margin-top:40px;
color:#d63384;
font-size:42px;
}

/* box nhập */

.box{
margin-top:40px;
background:rgba(255,255,255,0.55);
padding:25px;
border-radius:20px;
display:inline-block;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
padding:12px;
font-size:18px;
border:none;
border-radius:12px;
width:150px;
text-align:center;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:20px;
font-size:16px;
cursor:pointer;
background:#ff69b4;
color:white;
transition:0.3s;
}

button:hover{
background:#ff1493;
transform:scale(1.1);
}

/* máy bay */

.planeBox{
position:fixed;
top:120px;
left:-600px;
display:flex;
align-items:center;
gap:15px;
transition:5s linear;
z-index:5;
}

.planeImg{
width:180px;
}

.banner{
background:#ff1493;
color:white;
padding:10px 20px;
border-radius:10px;
font-weight:bold;
white-space:nowrap;
box-shadow:0 0 15px rgba(0,0,0,0.3);
}

/* thiệp */

.cardDrop{
position:fixed;
top:-200px;
left:50%;
transform:translateX(-50%);
width:260px;
background:white;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
transition:1s;
}

.cardInner{
padding:20px;
}

.name{
font-size:22px;
font-weight:bold;
color:#ff1493;
}

/* vòng quay */

#wheelBox{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.wheelContainer{
position:relative;
width:400px;
height:400px;
}

#wheel{
width:400px;
height:400px;
border-radius:50%;
border:8px solid white;
box-shadow:0 0 30px rgba(0,0,0,0.3);
transition:transform 5s cubic-bezier(.2,.8,.2,1);
}

.pointer{
position:absolute;
top:-20px;
left:50%;
transform:translateX(-50%);
font-size:40px;
color:red;
}

.spinBtn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:15px 30px;
font-size:18px;
background:#ff1493;
color:white;
border:none;
border-radius:50px;
cursor:pointer;
}

/* hoa */

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<div class="overlay"></div>

<h1>🌸 Chúc mừng ngày 8/3 🌸</h1>

<div class="box">

<p>Nhập STT của bạn</p>

<input id="stt" type="number">

<br>

<button onclick="startPlane()">💌 Nhận lời chúc</button>
<button onclick="openWheel()">🎁 Vòng quay</button>

</div>

<!-- máy bay -->

<div class="planeBox" id="planeBox">

<img class="planeImg"
src="https://png.pngtree.com/png-vector/20240809/ourlarge/pngtree-simple-airplane-cartoon-style-art-transparent-free-png-image_13423163.png">

<div class="banner">
Happy Women's Day
</div>

</div>

<!-- thiệp -->

<div class="cardDrop" id="cardDrop">

<div class="cardInner">

<div class="name" id="name"></div>

<p>Chúc bạn luôn xinh đẹp, học giỏi và có một ngày 8/3 thật vui vẻ 💖</p>

</div>

</div>

<!-- vòng quay -->

<div id="wheelBox">

<div class="wheelContainer">

<div class="pointer">▼</div>

<canvas id="wheel" width="400" height="400"></canvas>

<button class="spinBtn" onclick="spin()">QUAY</button>

</div>

</div>

<audio id="spinSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9bda63.mp3">
</audio>

<canvas id="petals"></canvas>

<script>

/* danh sách */

const girls={
1:"Dương Thị Thảo Ái",
3:"Nguyễn Thị Bình Dương",
4:"Nguyễn Thị Linh Đan",
7:"Nguyễn Thị Thúy Kiều",
8:"Dương Thùy Linh",
9:"Khổng Thị Linh",
10:"Lê Thị Linh",
11:"Hồ Thị Khánh Ly",
12:"Võ Thị Ly",
13:"Nguyễn Thị Thanh Mai",
14:"Lê Thị Thương Mây",
15:"Trần Thị Thanh Nga",
16:"Nguyễn Lê Thùy Ngân",
17:"Nguyễn Thị Thanh Ngân",
20:"Trần Thị Thanh Ngọc",
22:"Nguyễn Ngọc Phương Nhã",
25:"Nguyễn Ngọc Quỳnh Như",
28:"Nguyễn Thị Minh Phương",
30:"Hoàng Thị Diệu Thanh",
31:"Đào Thị Thanh Thảo",
32:"Nguyễn Thị Thanh Thảo",
33:"Lê Thị Thắm",
34:"Phan Thị Thơm",
36:"Phan Thị Anh Thư",
37:"Võ Thị Ngọc Trâm",
38:"Võ Thị Thùy Trâm",
39:"Mai Thị Vân",
40:"Lê Thị Hà Vi"
}

/* máy bay */

function startPlane(){

let stt=document.getElementById("stt").value

if(!girls[stt]){
alert("Không có trong danh sách nữ")
return
}

document.getElementById("name").innerText=girls[stt]

let plane=document.getElementById("planeBox")

plane.style.left="110%"

setTimeout(()=>{
document.getElementById("cardDrop").style.top="200px"
},2500)

}

/* vòng quay */

const prizes=["🍬 Kẹo","🍫 Chocolate","🌸 Hoa","🎁 Quà","🍪 Bánh","💖 Lời khen"]

const colors=["#ff9aa2","#ffb7b2","#ffdac1","#e2f0cb","#b5ead7","#c7ceea"]

const wheel=document.getElementById("wheel")
const ctx=wheel.getContext("2d")

const size=400
const center=size/2
const radius=200

function drawWheel(){

const angle=(2*Math.PI)/prizes.length

for(let i=0;i<prizes.length;i++){

ctx.beginPath()
ctx.moveTo(center,center)
ctx.arc(center,center,radius,i*angle,(i+1)*angle)

ctx.fillStyle=colors[i]
ctx.fill()

ctx.save()

ctx.translate(center,center)
ctx.rotate(i*angle+angle/2)

ctx.fillStyle="#333"
ctx.font="16px Arial"
ctx.textAlign="right"

ctx.fillText(prizes[i],170,10)

ctx.restore()

}

}

drawWheel()

let rotation=0

function spin(){

document.getElementById("spinSound").play()

let rand=Math.floor(Math.random()*prizes.length)

let angle=360/prizes.length

rotation+=360*5+(360-rand*angle)

wheel.style.transform="rotate("+rotation+"deg)"

setTimeout(()=>{
alert("Bạn nhận được: "+prizes[rand])
},5000)

}

function openWheel(){
document.getElementById("wheelBox").style.display="block"
}

/* hoa anh đào PNG */

const canvas=document.getElementById("petals")
const ctx2=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let petals=[]
const img=new Image()
img.src="https://pngimg.com/uploads/cherry_blossom/cherry_blossom_PNG9.png"

for(let i=0;i<40;i++){

petals.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*30+20,
speed:Math.random()*1+0.5,
angle:Math.random()*360
})

}

function drawPetals(){

ctx2.clearRect(0,0,canvas.width,canvas.height)

for(let p of petals){

ctx2.save()

ctx2.translate(p.x,p.y)
ctx2.rotate(p.angle*Math.PI/180)

ctx2.drawImage(img,-p.size/2,-p.size/2,p.size,p.size)

ctx2.restore()

p.y+=p.speed
p.x+=Math.sin(p.y*0.01)
p.angle+=0.2

if(p.y>canvas.height){
p.y=0
p.x=Math.random()*canvas.width
}

}

requestAnimationFrame(drawPetals)

}

img.onload=drawPetals

</script>

</body>
</html>
```
